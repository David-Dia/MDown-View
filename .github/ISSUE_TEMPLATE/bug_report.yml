name: Bug report
description: Report a reproducible problem in MDown View.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove sensitive content from sample files.

  - type: input
    id: version
    attributes:
      label: MDown View version
      placeholder: "1.0 or commit SHA"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.6"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: Minimal Markdown sample
      description: Include a minimal, non-sensitive sample when relevant.
      render: markdown

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, crash logs, or other useful details.
